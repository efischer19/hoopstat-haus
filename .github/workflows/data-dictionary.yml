name: Data Dictionary

on:
  push:
    branches: [main]
    paths:
      - 'libs/hoopstat-data/hoopstat_data/silver_models.py'
      - 'libs/hoopstat-data/hoopstat_data/gold_models.py'
      - 'scripts/generate-data-dictionary.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-data-dictionary:
    runs-on: ubuntu-latest
    name: Generate Data Dictionary

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install pydantic

    - name: Generate Data Dictionary
      run: python scripts/generate-data-dictionary.py

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "docs: auto-update Data Dictionary from Pydantic models"
        title: "docs: auto-update Data Dictionary"
        body: |
          Auto-generated update to the Data Dictionary from Pydantic model definitions.

          Triggered by changes to model schemas or the generator script.
        branch: auto/update-data-dictionary
        delete-branch: true
